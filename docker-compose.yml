version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: escalou_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-copa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-copa_pass}
      POSTGRES_DB: ${POSTGRES_DB:-adivinhe_copa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seeds/2026_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

volumes:
  postgres_data:
